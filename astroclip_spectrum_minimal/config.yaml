seed: 42
output_dir: ./outputs_specformer_pretrain

data:
  path: /scratch/users/nus/e0492520/astroclip_pipeline/exported/astroclip_dataset
  batch_size: 64
  num_workers: 0
  train_split: train
  val_split: test
  spectrum_key: spectrum
  pin_memory: true
  drop_last_train: true

model:
  input_dim: 22
  embed_dim: 768
  num_layers: 6
  num_heads: 6
  max_len: 800
  dropout: 0.0
  mask_num_chunks: 6
  mask_chunk_width: 50
  slice_section_length: 20
  slice_overlap: 10

optim:
  lr: 1.0e-5
  weight_decay: 1.0e-1
  betas: [0.9, 0.95]
  grad_clip: 1.0

schedule:
  max_steps: 500000
  warmup_steps: 2000
  eta_min_ratio: 0.01

train:
  epochs: 10
  log_every: 20
  save_every_epochs: 1
  use_amp: true

analysis:
  embedding_batches: 1
  embedding_sample_limit: 8
